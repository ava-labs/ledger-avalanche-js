name: Publish Package

on:
  # Trigger on PRs for validation
  pull_request:
    branches:
      - main
      - develop
      - release/*
  
  # Trigger on tag pushes like v1.0.0
  push:
    tags:
      - "v[0-9]+(\\.[0-9]+)*"
  
  # Trigger when a GitHub Release is created
  release:
    types:
      - created
    tags:
      - "v[0-9]+(\\.[0-9]+)*"

permissions:
  id-token: write    # Required for OIDC auth
  contents: write    # Required to push lockfile updates on PRs

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@avalabs"

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            npm install -g yarn
            # For releases/tags, require frozen lockfile
            if [[ "${{ github.event_name }}" == "release" ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
              yarn install --frozen-lockfile
            # For PRs, allow lockfile updates
            elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
              if ! yarn install --frozen-lockfile; then
                echo "Lockfile out of sync — updating yarn.lock"
                yarn install
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add yarn.lock
                git commit -m "chore: update yarn.lock (generated by CI)" || echo "No changes to commit"
                git push origin HEAD:${{ github.head_ref }}
              fi
            else
              yarn install --frozen-lockfile
            fi
          else
            npm ci
          fi

      - name: Build package
        run: npm run build --if-present

      - name: Run tests
        run: npm test || echo "No tests found, skipping..."

      # Only do publish steps for tags or releases
      - name: Get release version
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        id: get_version
        uses: battila7/get-version-action@v2

      - name: Update package.json version
        if: steps.get_version.outputs.version != ''
        run: |
          echo "Publishing version ${{ steps.get_version.outputs.version }}"
          npm --allow-same-version --no-git-tag-version version ${{ steps.get_version.outputs.version }}

      - name: Publish to npm (with OIDC)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || github.token }}
