name: Publish Package

on:
  # Trigger on PRs for validation
  pull_request:
    branches:
      - main
      - develop
      - release/*
  
  # Trigger on tag pushes like v1.0.0
  push:
    tags:
      - "v[0-9]+(\\.[0-9]+)*"
  
  # Trigger when a GitHub Release is created
  release:
    types:
      - created
    tags:
      - "v[0-9]+(\\.[0-9]+)*"

permissions:
  id-token: write    # Required for OIDC auth
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@avalabs"

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            npm install -g yarn
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build package
        run: npm run build --if-present

      - name: Run tests
        run: npm test || echo "No tests found, skipping..."

      # Only do publish steps for tags or releases
      - name: Get release version
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        id: get_version
        uses: battila7/get-version-action@v2

      - name: Update package.json version
        if: steps.get_version.outputs.version != ''
        run: |
          echo "Publishing version ${{ steps.get_version.outputs.version }}"
          npm --allow-same-version --no-git-tag-version version ${{ steps.get_version.outputs.version }}

      - name: Publish to npm (with OIDC)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || github.token }}
